# Helm values for installing substrate on a kind cluster in JWT mode.
# Used by hack/install-ate-kind-jwt.sh — does NOT require the off-by-default
# certificate feature gates that the mTLS install path needs.

auth:
  mode: jwt
  jwt:
    # Kind's default API server issuer.
    issuer: https://kubernetes.default.svc.cluster.local
    audience: api.ate-system.svc
    serverCertSecret: ateapi-tls
    caBundleConfigMap: ateapi-ca

createNamespace: false

# In-cluster OTel collector deployed alongside via manifests/ate-install/kind/otel-collector.yaml
otel:
  endpoint: http://opentelemetry-collector.otel-system.svc:4317

monitoring:
  gkePodMonitoring:
    enabled: false

atelet:
  gcpAuthForImagePulls: false
  extraArgs:
    - --localhost-registry-replacement=kind-registry:5000
