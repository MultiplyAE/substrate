name: release
# Publish Agent Substrate images (ko) and Helm charts (OCI) to GHCR under
# ghcr.io/multiplyae/substrate on a version tag. Uses the workflow GITHUB_TOKEN
# (packages: write) — no personal access token needed.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  KO_DOCKER_REPO: ghcr.io/multiplyae/substrate

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: ko-build/setup-ko@v0.8

      - name: Log in to GHCR (ko)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | ko login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push images
        run: |
          set -euo pipefail
          # Strip the leading "v" so image tags equal the Helm chart appVersion (the
          # package step below also strips it). The chart's componentImage helper defaults
          # the image tag to .Chart.AppVersion, so the two MUST match or every image ref 404s.
          TAG="${GITHUB_REF_NAME#v}"
          # Build all control-plane images + the gVisor runtime image directly with ko, using the
          # job-level KO_DOCKER_REPO (GHCR). We intentionally bypass `make build-images`, whose
          # Makefile sets `export KO_DOCKER_REPO := gcr.io/$(PROJECT_ID)/ate-images` with ':=',
          # which overrides the environment variable.
          ko build --base-import-paths --tags "${TAG},latest" \
            ./cmd/ateapi ./cmd/atecontroller ./cmd/atelet ./cmd/podcertcontroller ./cmd/atenet ./cmd/ateom-gvisor

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR (helm)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Package and push charts
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          for c in substrate substrate-crds; do
            helm package "charts/${c}" --version "${VERSION}" --app-version "${VERSION}"
            helm push "${c}-${VERSION}.tgz" oci://ghcr.io/multiplyae/substrate/helm
          done
